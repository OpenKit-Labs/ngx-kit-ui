name: Build and Publish to npmjs

on:
    release:
        types: [published]
    push:
        tags:
            - "v*"

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # Required for OIDC trusted publishing
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: "https://registry.npmjs.org"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build library
              run: npx ng build ngx-kit-ui

            # Trusted publishing requires a recent npm CLI with the npmjs registry configured.
            - name: Publish to npmjs
              run: |
                  npx npm@latest publish ./dist/ngx-kit-ui --provenance --access public
