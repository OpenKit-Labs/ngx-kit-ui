name: Build and Publish to npmjs

on:
    release:
        types: [published]
    push:
        tags:
            - "v*"

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # Required for OIDC trusted publishing
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build library
              run: npx ng build ngx-kit-ui

            # OIDC trusted publishing handles auth automatically — no .npmrc or token needed.
            # Registry is forced here to override publishConfig.registry in package.json
            # (which currently points to GitHub Packages).
            - name: Publish to npmjs
              run: |
                  npm publish ./dist/ngx-kit-ui --registry https://registry.npmjs.org/ --access public
