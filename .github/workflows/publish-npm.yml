name: Build and Publish to npmjs

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx ng build ngx-kit-ui

      # Trusted publishing requires a recent npm CLI with the npmjs registry configured.
      - name: Publish to npmjs
        run: |
          npx npm@latest publish ./dist/ngx-kit-ui --provenance --access public
