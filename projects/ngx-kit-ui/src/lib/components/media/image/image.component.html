<div class="kit-image-container"
     [style.object-fit]="objectFit()"
     [style.width]="width()"
     [style.height]="height()"
     [style.aspectRatio]="aspectRatio() ?? null"
     [style.borderRadius]="borderRadius() ?? null">

    <!-- Image -->
    @if(showImage() && !errored())
    {
    <ng-container>
        <img [src]="src()"
             [style.object-fit]="objectFit()"
             [style.borderRadius]="borderRadius() ?? null"
             class="kit-image">
    </ng-container>
    }

    <!-- Loading state: custom template or default shimmer -->
    @if(isLoading())
    {
    <ng-container>
        @if(loadingTemplate()) {
            <ng-container *ngTemplateOutlet="loadingTemplate()"></ng-container>
        } @else {
            <div class="kit-image-skeleton"></div>
        }
    </ng-container>
    }

    @if(errored() && errorSrc())
    {
    <ng-container>
        <img [src]="errorSrc()"
             [style.object-fit]="objectFit()"
             [style.borderRadius]="borderRadius() ?? null"
             class="kit-image">
    </ng-container>
    }

    @if(errored() && !errorSrc())
    {
    <ng-container>
        @if(errorTemplate()) {
            <ng-container *ngTemplateOutlet="errorTemplate()"></ng-container>
        } @else {
            <div class="kit-image-error"></div>
        }
    </ng-container>
    }
</div>
