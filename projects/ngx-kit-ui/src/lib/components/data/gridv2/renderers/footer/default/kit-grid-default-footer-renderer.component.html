<div class="kit-grid-default-footer-container">

    <kit-row [fullWidth]="true"
             [fullHeight]="true"
             crossAxisAlignment="center"
             mainAxisAlignment="between">


        <kit-row [gap]="4">
            <kit-text-caption>Showing</kit-text-caption>
            <kit-text-body weight="bold"
                           margin="0">{{ result.data.length }}</kit-text-body>
            <kit-text-caption>of</kit-text-caption>
            <kit-text-body weight="bold"
                           margin="0">{{ result.total }}</kit-text-body>
        </kit-row>


        <kit-row [gap]="4"
                 mainAxisAlignment="center"
                 crossAxisAlignment="center">
            <kit-button-round color="transparent"
                              [disabled]="query.page === 0"
                              (clicked)="prev()">
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="14"
                     height="14"
                     viewBox="0 0 16 16"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.5"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M10 13L4 8l6-5" />
                </svg>
            </kit-button-round>

            <kit-text-caption>{{ query.page + 1 }} / {{ totalPages }}</kit-text-caption>

            <kit-button-round color="transparent"
                              [disabled]="query.page >= totalPages - 1"
                              (clicked)="next()">
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="14"
                     height="14"
                     viewBox="0 0 16 16"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.5"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M6 3l6 5-6 5" />
                </svg>
            </kit-button-round>
        </kit-row>

    </kit-row>
</div>
