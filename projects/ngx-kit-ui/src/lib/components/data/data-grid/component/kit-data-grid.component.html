<div class="kit-grid-outer"
     [class.kit-grid-flex]="heightMode === 'flex'"
     [class.kit-grid-fixed]="heightMode === 'fixed'"
     [class.kit-grid-viewport]="heightMode === 'viewport'"
     [style.height]="outerHeight">

    <div class="kit-grid-scroll-area">
        <div class="kit-grid-wrapper">

            <!-- Header row -->
            <div class="kit-grid-header"
                 [style.grid-template-columns]="gridTemplateColumns">
                @for (col of columns; track $index; let i = $index) {
                <div class="kit-grid-header-cell">
                    <ng-container #headerCell></ng-container>
                </div>
                }
            </div>

            <!-- Data rows -->
            @for (row of result.data; track $index; let i = $index) {
            <div class="kit-grid-row"
                 [style.grid-template-columns]="gridTemplateColumns"
                 [ngStyle]="rowStyle"
                 (click)="onRowClick(row, i, $event)">
                @for (col of columns; track $index) {
                <div class="kit-grid-cell">
                    <ng-container #dataCell></ng-container>
                </div>
                }
            </div>
            }

            @if (result.data.length === 0) {
            <div class="kit-grid-empty">No data</div>
            }

        </div>
    </div>

    @if (config.footer?.isVisible !== false) {
    <ng-container #footerCell></ng-container>
    }

</div>
