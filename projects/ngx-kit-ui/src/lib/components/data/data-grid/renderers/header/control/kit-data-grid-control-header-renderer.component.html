<kit-row [fullWidth]="true"
         [fullHeight]="true"
         crossAxisAlignment="center"
         mainAxisAlignment="between"
         [gap]="16">

    @if (!searching) {
    <kit-text-body weight="bold"
                   margin="0">{{ title }}</kit-text-body>
    }
    @else {
    <kit-input-text [placeholder]="'Search ' + title"
                    [(value)]="searchValue"
                    (valueChange)="onSearchChange($event)"
                    margin="0">
    </kit-input-text>
    }

    <div class="kit-grid-header-icons">

        <!--Search icon - always visible-->
        <kit-text-caption [color]="searching ? 'primary' : ''">
            <span class="kit-grid-header-icon-btn"
                  (click)="toggleSearch()">
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="14"
                     height="14"
                     viewBox="0 0 16 16"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.5"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="6.5"
                            cy="6.5"
                            r="4" />
                    <line x1="9.5"
                          y1="9.5"
                          x2="13.5"
                          y2="13.5" />
                </svg>
            </span>
        </kit-text-caption>

        <!--Sort icon - single stable element, path changes with state-->
        @if (isSortable && !searching) {
        <kit-text-caption [color]="sortState !== 'none' ? 'primary' : ''">
            <span class="kit-grid-header-icon-btn"
                  (click)="cycleSortState()">
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="14"
                     height="14"
                     viewBox="0 0 16 16"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.5"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <path [attr.d]="sortIconPath" />
                </svg>
            </span>
        </kit-text-caption>
        }

    </div>

</kit-row>
